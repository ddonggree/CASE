<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 데이터를 활용한 CASE 토론</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
:root{
  --paper:#FDF5F3; --surface:#fff; --ink:#402e34; --inkSoft:#6d5960; --muted:#9d8b92; --line:#F2E3DF;
  --brand:#F2683E; --brandDeep:#CF4B28; --brandSoft:#FCE9E2; --rose:#E85D8A; --gold:#EBA43A; --goldSoft:#FBF1DD;
  --radius:10px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--ink);
  font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;line-height:1.6}
button{font-family:inherit}
input,textarea{font-family:inherit}
.wrap{max-width:1080px;margin:0 auto;padding:0 20px}
header.top{position:sticky;top:0;z-index:20;background:rgba(253,245,243,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.top .wrap{display:flex;align-items:center;justify-content:space-between;padding:12px 20px}
.brandmark{display:flex;align-items:center;gap:9px;background:none;border:none;cursor:pointer;padding:0}
.brandmark .logo{width:30px;height:30px;border-radius:9px;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:16px}
.brandmark b{font-size:15.5px;font-weight:800;color:var(--ink)}
main{padding:28px 0 72px}
.link-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;color:var(--inkSoft);font-size:14px;font-weight:600;padding:6px 0}
.link-btn:hover{color:var(--brand)}
.cta{transition:transform .12s,filter .12s;cursor:pointer}
.cta:hover{filter:brightness(1.04);transform:translateY(-1px)}
.mini{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:7px 12px;font-size:13px;font-weight:700;color:var(--inkSoft);cursor:pointer}
.mini:hover{border-color:var(--brand);color:var(--brand)}
.pill{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;border:1px solid var(--line);border-radius:999px;padding:8px 13px;font-size:13.5px;font-weight:700;cursor:pointer;background:var(--surface);color:var(--inkSoft);transition:all .15s}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px}
.fld{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-size:15px;color:var(--ink);outline:none;transition:border-color .12s,box-shadow .12s}
.fld:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brandSoft)}
.fld::placeholder{color:#cdb6b0}
.casecard{text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:0 0 14px 14px;padding:16px;cursor:pointer;position:relative;transition:transform .14s,box-shadow .14s}
.casecard:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(64,46,52,.10)}
.secpill{display:inline-flex;align-items:center;gap:5px;white-space:nowrap;border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;background:var(--surface);color:var(--inkSoft)}
.step{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:1px solid var(--line);border-radius:12px;padding:9px 6px;cursor:pointer;font-size:13px;font-weight:700;background:var(--surface);color:var(--inkSoft);transition:all .15s}
.step:disabled{cursor:not-allowed;opacity:.7}
textarea.note{width:100%;min-height:130px;resize:vertical;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;line-height:1.6;color:var(--ink);outline:none}
textarea.note:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brandSoft)}
.hidebar::-webkit-scrollbar{height:0}
h1,h2,h3,h4{margin:0}
.print-only{display:none}
.modal-bg{position:fixed;inset:0;background:rgba(50,30,36,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--surface);border-radius:16px;max-width:660px;width:100%;max-height:86vh;overflow:auto}
.modal-h{position:sticky;top:0;background:var(--surface);display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--line);z-index:1}
.modal-b{padding:18px 20px}
.modal-f{position:sticky;bottom:0;background:var(--surface);display:flex;gap:8px;justify-content:flex-end;padding:13px 20px;border-top:1px solid var(--line)}
@media (max-width:900px){
  .grid3{grid-template-columns:repeat(2,1fr)!important}
  .grid4{grid-template-columns:repeat(2,1fr)!important}
  .qa{grid-template-columns:1fr!important}
  .two{grid-template-columns:1fr!important}
}
@media (max-width:600px){
  .grid3,.grid4{grid-template-columns:1fr!important}
  .stepbar{overflow-x:auto}
  .step{min-width:88px}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
@media print{
  header.top,.noprint{display:none!important}
  body{background:#fff}
  .print-only{display:block!important}
}
</style>
</head>
<body>
<header class="top">
  <div class="wrap">
    <button class="brandmark" data-act="home"><span class="logo">🎓</span><b>학생 데이터 CASE 토론</b></button>
    <div id="hdr-right"></div>
  </div>
</header>
<main><div class="wrap"><div id="app"></div></div></main>
<div id="modal-root" class="noprint"></div>

<script>
const SECS=[
 {k:'overview',l:'개요',i:'📋'},
 {k:'diagnosis',l:'초기진단',i:'🧭'},
 {k:'achievement',l:'성취수준',i:'📊'},
 {k:'noncog',l:'비인지 프로필',i:'🧩'},
 {k:'observation',l:'교사 관찰',i:'👁️'},
 {k:'counseling',l:'상담 요약',i:'💬'}
];
const AX=['자신감','학습의욕','흥미','가치'];

const D=[
 {id:1,t:'완벽주의형',c:'#EC6A5A',d:'실수를 두려워하며 완벽을 추구하는 학생',tg:['성취우수','불안높음'],
  ov:'지필 성취는 대체로 우수하나, 실수에 대한 두려움 때문에 과제를 끝까지 제출하지 못하거나 지나치게 오래 붙잡는다. 틀리는 것을 학습의 일부로 받아들이는 경험이 부족하다.',
  dgK:{pat:['완벽한 답을 쓰려다 시간 부족','틀릴까봐 쓰기를 시작하지 못함'],sig:['과제 미제출 빈도 높음','수정한 흔적 과도하게 많음']},
  dgM:{pat:['계산 실수 두려워 검산 반복','어려운 문제는 시도 안 함'],sig:['문제 푸는 속도 매우 느림','지우개 사용 빈번함']},
  acK:{my:4,avg:2},acM:{my:4,avg:2},
  nc:[2,4,3,4],nn:'학습의욕·가치 인식은 높으나 자신감이 낮아 완벽주의로 이어진다.',
  ob:['과제를 완성하지 못하면 제출하지 않으려 함','작은 실수에도 크게 좌절하고 다시 시작함','발표 전 반복적으로 확인하며 불안해함'],
  ck:['개별 상담 필요성 검토','학부모 면담 예정','또래 관계 지원 계획'],
  coCog:'국어와 수학 모두 4수준으로 성취는 양호하나, 완벽하지 않으면 제출을 꺼리는 패턴이 학습 기회를 제한하고 있습니다.',
  coNon:'자신감 2점으로 실수에 대한 두려움이 크며, 과제 완성도에 집착하여 학습 과정의 즐거움을 느끼지 못하고 있습니다.',
  sc:'성취는 양호하나 완벽주의로 인해 과제 완성도와 제출률이 낮아 실제 학습 기회가 제한되고 있습니다.',
  sn:'실수에 대한 두려움이 크고 자신감이 낮아, 과정 중심 피드백과 실수를 학습으로 전환하는 경험이 필요합니다.',
  st:['과제 제출 시 ‘완성도’보다 ‘시도한 과정’에 초점을 둔 피드백을 제공할 수 있습니다','작은 단위로 쪼갠 과제를 제시하여 성공 경험을 쌓을 수 있도록 할 수도 있습니다','실수가 학습의 일부임을 강조하는 긍정적 오류 문화를 조성해도 좋습니다']},

 {id:2,t:'말하지 않는 형',c:'#E8558A',d:'조용하지만 내면에 생각이 많은 학생',tg:['참여낮음','관찰력높음'],
  ov:'수업 내용을 잘 이해하고 글이나 그림으로는 풍부하게 표현하지만, 말로 발표하거나 모둠 대화에 참여하는 것을 어려워한다. 조용함이 이해 부족으로 오해되기도 한다.',
  dgK:{pat:['글로는 잘 쓰나 말하기·발표를 피함','생각을 오래 정리한 뒤에야 표현'],sig:['발표·질문 상황에서 침묵','모둠 대화 참여 저조']},
  dgM:{pat:['혼자 조용히 풀이는 잘함','풀이 과정을 설명하길 꺼림'],sig:['질문을 잘 하지 않음','모르는 부분을 드러내지 않음']},
  acK:{my:3,avg:2},acM:{my:3,avg:3},
  nc:[2,3,3,4],nn:'내적 동기·가치는 있으나 자신감이 낮아 밖으로 드러나지 않는다.',
  ob:['정답을 알아도 지목받으면 대답을 주저함','글·쪽지로는 생각을 풍부하게 표현함','짝과의 1:1 대화에서는 한결 편안해함'],
  ck:['발표 부담 완화 방안 마련','소규모 발화 기회 설계','상담 통한 정서 확인'],
  coCog:'국어·수학 모두 3수준으로 학업 이해는 양호하나, 말하기·발표 참여가 낮아 실제 역량이 과소평가되고 있습니다.',
  coNon:'자신감 2점으로 평가 상황에 위축되며, 글·비언어 표현에 비해 구두 참여에서 어려움을 보입니다.',
  sc:'이해력은 충분하나 산출(말하기·발표)에서 참여가 제한되어 역량이 과소평가될 수 있습니다.',
  sn:'자신감 부족과 평가 불안이 커, 안전하게 말할 수 있는 소규모 기회의 누적이 필요합니다.',
  st:['짝→모둠→전체 순서로 발화 규모를 점진적으로 넓혀 줄 수 있습니다','글·그림 등 말하기 외의 표현 통로를 함께 인정해도 좋습니다','‘실수해도 괜찮은’ 교실 규칙으로 심리적 안전감을 높일 수 있습니다']},

 {id:3,t:'개인활동 중심형',c:'#B5658F',d:'혼자 공부는 잘하나 모둠활동에 어려움',tg:['국어강점','협력취약'],
  ov:'개인 과제와 자기주도 학습에서는 뛰어난 성취를 보이지만, 모둠 협력·역할 분담·의견 조율에서 어려움을 겪는다. 함께하는 활동을 비효율적이라 느끼기도 한다.',
  dgK:{pat:['개인 독해·글쓰기 몰입도 높음','모둠 토의에서 혼자 진행'],sig:['협동 과제 역할 분담 회피','친구 의견 반영이 적음']},
  dgM:{pat:['혼자 문제 해결을 선호','또래 설명·협력 활동에 소극적'],sig:['모둠 풀이보다 개인 풀이 고집','협력 평가 점수가 낮음']},
  acK:{my:4,avg:3},acM:{my:3,avg:3},
  nc:[4,4,3,2],nn:'자신감·의욕은 높으나 ‘함께 배우는 가치’에 대한 인식이 낮다.',
  ob:['모둠 활동에서 혼자 방식대로 끝내려 함','친구 의견을 기다리기 어려워함','개인 과제에서 높은 집중과 완성도를 보임'],
  ck:['협력 과제 역할 구조화','모둠 구성 조정 검토','협력 성공 경험 계획'],
  coCog:'국어 4수준·수학 3수준으로 개인 학업은 우수하나, 협력 상황에서 강점을 나누고 조율하는 경험이 부족합니다.',
  coNon:'자신감 4점으로 개인 학습 효능감은 높으나, 함께 배우는 가치에 대한 인식이 낮습니다.',
  sc:'개인 학습 역량은 우수하나, 협력 상황에서 그 강점을 나누고 조율하는 경험이 부족합니다.',
  sn:'협력의 가치에 대한 인식이 낮아, 함께 해서 더 나아지는 성공 경험이 필요합니다.',
  st:['각자 맡을 역할을 분명히 정해 협력의 부담을 낮춰 줄 수 있습니다','혼자서는 풀기 어려운 상호의존형 과제로 협력의 이점을 체감하게 할 수 있습니다','친구를 가르치거나 설명하는 역할로 강점을 협력에 연결해도 좋습니다']},

 {id:4,t:'실패 회피형',c:'#7E6BB5',d:'도전보다 안전을 선택하는 학생',tg:['자신감낮음','안정추구'],
  ov:'어려운 과제나 새로운 시도 앞에서 ‘안 할래요’ ‘못 하겠어요’로 물러선다. 실패 경험을 피하려다 배움의 기회를 놓친다.',
  dgK:{pat:['쉬운 지문·과제만 선택','새로운 글쓰기 형식 시도 회피'],sig:['어려운 문항 공백으로 제출','‘못 하겠다’ 표현 잦음']},
  dgM:{pat:['익숙한 유형만 반복','낯선 문제는 시작 전 포기'],sig:['도전 문항을 건너뜀','오답 시 쉽게 좌절']},
  acK:{my:2,avg:3},acM:{my:2,avg:3},
  nc:[1,2,3,3],nn:'흥미·가치는 있으나 자신감이 매우 낮아 시도로 이어지지 못한다.',
  ob:['조금만 어려워 보이면 시작 전에 포기함','쉬운 과제는 무리 없이 해냄','성공을 ‘운’으로 돌리며 자신감이 낮음'],
  ck:['스몰스텝 과제 설계','노력 칭찬 피드백 계획','상담으로 두려움 확인'],
  coCog:'국어·수학 모두 2수준으로, 능력 부족보다 도전 회피가 성취를 제한하고 있습니다.',
  coNon:'자신감 1점으로 실패에 대한 두려움이 커, 감당 가능한 난이도의 성공 경험 누적이 필요합니다.',
  sc:'능력이 부족해서가 아니라, 실패를 피하려다 도전과 학습 기회를 스스로 줄이고 있습니다.',
  sn:'낮은 자기효능감이 핵심으로, 감당 가능한 난이도의 성공 경험을 쌓는 것이 중요합니다.',
  st:['과제를 단계로 나눠(스캐폴딩) 성공 가능성을 높여 줄 수 있습니다','결과보다 ‘시도와 노력’에 귀인하는 피드백을 제공할 수 있습니다','실패해도 안전한 ‘연습 구역’을 만들어 도전을 격려해도 좋습니다']},

 {id:5,t:'무기력형',c:'#5A7FB8',d:'학습 의욕과 에너지가 낮은 학생',tg:['참여낮음','지속력낮음'],
  ov:'전반적으로 학습 의욕과 에너지가 낮고 수업에 무기력하게 참여한다. 흥미를 보이는 영역을 찾기 어려운 상태이며, 정서·환경 배경 탐색이 필요하다.',
  dgK:{pat:['읽기·쓰기 전반에 의욕 낮음','최소한만 채워 제출'],sig:['수업 중 멍하게 있음','흥미 있는 주제를 찾기 어려움']},
  dgM:{pat:['문제 풀이 지속 시간 짧음','조금 어려우면 곧 손 놓음'],sig:['연습 문제 미완성 잦음','참여·반응이 매우 낮음']},
  acK:{my:2,avg:3},acM:{my:1,avg:3},
  nc:[2,1,2,2],nn:'대부분의 축이 낮아, 먼저 ‘흥미의 불씨’와 정서적 배경 파악이 필요하다.',
  ob:['수업 대부분을 무표정하게 보냄','좋아하는 것을 물어도 ‘없다’고 답함','특정 활동에서 잠깐 흥미를 보일 때가 있음'],
  ck:['배경 요인(정서·가정) 확인','전문 상담 연계 검토','흥미 실마리 탐색'],

function radar(vals,c){
  const cx=150,cy=115,R=74,ang=[-90,0,90,180];
  const pt=(v,a)=>{const r=(v/5)*R,rad=a*Math.PI/180;return[cx+r*Math.cos(rad),cy+r*Math.sin(rad)];};
  let g='';
  for(let ring=1;ring<=5;ring++){let p=ang.map(a=>pt(ring,a).map(n=>n.toFixed(1)).join(',')).join(' ');g+='<polygon points="'+p+'" fill="none" stroke="#EFE1DD" stroke-width="1"/>';}
  ang.forEach(a=>{const q=pt(5,a);g+='<line x1="'+cx+'" y1="'+cy+'" x2="'+q[0].toFixed(1)+'" y2="'+q[1].toFixed(1)+'" stroke="#EFE1DD" stroke-width="1"/>';});
  const dp=vals.map((v,i)=>pt(v,ang[i]).map(n=>n.toFixed(1)).join(',')).join(' ');
  g+='<polygon points="'+dp+'" fill="'+c+'" fill-opacity="0.24" stroke="'+c+'" stroke-width="2"/>';
  vals.forEach((v,i)=>{const q=pt(v,ang[i]);g+='<circle cx="'+q[0].toFixed(1)+'" cy="'+q[1].toFixed(1)+'" r="3.5" fill="'+c+'"/>';});
  const lab=[[cx,cy-R-16,'middle'],[cx+R+12,cy-2,'start'],[cx,cy+R+24,'middle'],[cx-R-12,cy-2,'end']];
  vals.forEach((v,i)=>{const L=lab[i];g+='<text x="'+L[0]+'" y="'+L[1]+'" text-anchor="'+L[2]+'" font-size="12" fill="#6d5960">'+AX[i]+'</text><text x="'+L[0]+'" y="'+(L[1]+15)+'" text-anchor="'+L[2]+'" font-size="12" font-weight="700" fill="'+c+'">'+v+'</text>';});
  return '<svg viewBox="0 0 300 250" width="300" height="250" style="max-width:100%;height:auto" role="img" aria-label="비인지 프로필 레이더">'+g+'</svg>';
}

function sStage(s){
  return '<div style="max-width:760px;margin:0 auto"><div class="card" style="border-top:4px solid '+s.c+';border-radius:0 0 18px 18px;padding:24px">'
   +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:18px"><span style="font-size:19px">📋</span><h3 style="font-size:20px;font-weight:800">'+esc(s.t)+' 지원 전략</h3></div>'
   +'<div style="background:linear-gradient(180deg,#FCEFF2,#FBF5F7);border-left:4px solid var(--rose);border-radius:0 12px 12px 0;padding:16px 18px;margin-bottom:16px"><div style="display:flex;align-items:center;gap:7px;margin-bottom:10px"><span>🎯</span><b style="font-size:15.5px">핵심 진단 요약</b></div><p style="margin:0 0 8px;font-size:14.5px;line-height:1.7"><b>인지 요인:</b> '+esc(s.sc)+'</p><p style="margin:0;font-size:14.5px;line-height:1.7"><b>비인지 요인:</b> '+esc(s.sn)+'</p></div>'
   +'<div style="background:var(--goldSoft);border-radius:12px;padding:16px 18px"><div style="display:flex;align-items:center;gap:7px;margin-bottom:12px"><span>⚡</span><b style="font-size:15.5px">내일 바로 실천 전략</b></div>'
   +s.st.map((x,i)=>'<div style="display:flex;gap:11px;margin-bottom:11px"><span style="width:23px;height:23px;border-radius:50%;flex-shrink:0;background:var(--gold);color:#fff;display:grid;place-items:center;font-size:12.5px;font-weight:800">'+(i+1)+'</span><p style="margin:0;font-size:14.5px;line-height:1.65;color:#5f5117">'+esc(x)+'</p></div>').join('')+'</div>'
   +extBlocks(s)
   +'<div style="margin-top:14px;font-size:12.5px;color:var(--muted);line-height:1.6">이 전략은 토론을 돕는 <b>참고 예시</b>입니다. 정답이 아니라, 모둠이 세운 판단과 비교해 보는 용도로 활용하세요.</div>'
   +'<div style="margin-top:14px"><button class="mini" data-act="s-back">‹ 토론 질문으로</button></div>'
   +'</div></div>';
}
function printSheet(s){
  const qs=QS(s.t);const bl=(a)=>a.map(x=>'<li>'+esc(x)+'</li>').join('');
  return '<div class="print-only" style="padding:8px 4px;color:#222">'
   +'<h1 style="font-size:20px;margin:0 0 4px">[CASE '+s.id+'] '+esc(s.t)+' — 학생 데이터 CASE 토론</h1>'
   +'<div style="font-size:12px;color:#555;margin-bottom:10px">'+esc(s.d)+' · 모둠: '+esc(S.group.name||'(미입력)')+' · 구성원: '+esc(S.group.members.filter(Boolean).join(', ')||'(미입력)')+'</div>'
   +'<h3 style="font-size:14px;margin:10px 0 3px">개요</h3><p style="font-size:12.5px;margin:0">'+esc(s.ov)+'</p>'
   +'<h3 style="font-size:14px;margin:10px 0 3px">초기진단</h3><p style="font-size:12.5px;margin:0"><b>국어</b> 패턴: '+s.dgK.pat.join(' / ')+' · 신호: '+s.dgK.sig.join(' / ')+'<br><b>수학</b> 패턴: '+s.dgM.pat.join(' / ')+' · 신호: '+s.dgM.sig.join(' / ')+'</p>'
   +'<h3 style="font-size:14px;margin:10px 0 3px">성취수준(4수준제)</h3><p style="font-size:12.5px;margin:0">국어 나의수준 '+s.acK.my+' / 학급평균 '+s.acK.avg+' ('+cmt(s.acK.my,s.acK.avg)+') · 수학 나의수준 '+s.acM.my+' / 학급평균 '+s.acM.avg+' ('+cmt(s.acM.my,s.acM.avg)+')</p>'
   +'<h3 style="font-size:14px;margin:10px 0 3px">비인지 프로필</h3><p style="font-size:12.5px;margin:0">'+AX.map((a,i)=>a+' '+s.nc[i]).join(' · ')+' · '+esc(s.nn)+'</p>'
   +'<h3 style="font-size:14px;margin:10px 0 3px">교사 관찰</h3><ul style="font-size:12.5px;margin:0 0 0 16px">'+bl(s.ob)+'</ul><div style="font-size:12.5px">체크리스트: '+s.ck.join(', ')+'</div>'
   +'<h3 style="font-size:14px;margin:10px 0 3px">상담 요약</h3><p style="font-size:12.5px;margin:0"><b>인지:</b> '+esc(s.coCog)+' <b>비인지:</b> '+esc(s.coNon)+'</p>'
   +'<h3 style="font-size:14px;margin:12px 0 3px">토론 질문</h3><ol style="font-size:12.5px;margin:0 0 0 16px">'+qs.map(q=>'<li style="margin-bottom:2px">'+esc(q)+'</li>').join('')+'</ol>'
   +'<h3 style="font-size:14px;margin:12px 0 3px">지원 전략(참고)</h3><p style="font-size:12.5px;margin:0 0 3px"><b>인지:</b> '+esc(s.sc)+'</p><p style="font-size:12.5px;margin:0 0 3px"><b>비인지:</b> '+esc(s.sn)+'</p><ol style="font-size:12.5px;margin:0 0 0 16px">'+bl(s.st)+'</ol>'
   +'<h3 style="font-size:14px;margin:12px 0 3px">2주 성장 경로</h3><p style="font-size:12.5px;margin:0"><b>인지:</b> '+EXT[s.id].gr.cog.map((t,i)=>(i+1)+'주 '+t).join(' · ')+'<br><b>비인지:</b> '+EXT[s.id].gr.non.map((t,i)=>(i+1)+'주 '+t).join(' · ')+'</p>'
   +'<h3 style="font-size:14px;margin:10px 0 3px">활동 예시</h3><p style="font-size:12.5px;margin:0"><b>국어:</b> '+esc(EXT[s.id].av.kor.join(' / '))+'<br><b>수학:</b> '+esc(EXT[s.id].av.math.join(' / '))+'</p>'
   +'<h3 style="font-size:14px;margin:10px 0 3px">AI·디지털 도구 활용 전략</h3><p style="font-size:12.5px;margin:0">'+esc(EXT[s.id].ai)+'</p>'
   +(S.notes[s.id]&&S.notes[s.id].trim()?'<h3 style="font-size:14px;margin:12px 0 3px">모둠 토론 기록</h3><p style="font-size:12.5px;white-space:pre-wrap;margin:0">'+esc(S.notes[s.id])+'</p>':'')
   +'</div>';
}
function sheetHTML(s){return printSheet(s).replace('class="print-only"','class="sheet-view"');}
function detail(){
  const s=cur();const st=stages[S.stage];
  const inner=st==='data'?dataStage(s):st==='questions'?qStage(s):sStage(s);
  return '<section><div class="noprint" style="display:flex;justify-content:space-between;align-items:center"><button class="link-btn" data-act="exit" data-idx="-1">← 학생 목록</button><button class="mini" data-act="print">🖨 요약 시트 인쇄 / PDF</button></div>'
   +'<div class="noprint">'+stepbar(s)+ident(s)+inner+'</div>'+printSheet(s)+'</section>';
}
function fmt(x){return String(Math.floor(x/60)).padStart(2,'0')+':'+String(x%60).padStart(2,'0');}

function hdr(){
  const n=Object.values(S.notes).filter(v=>v&&v.trim()).length;
  $('hdr-right').innerHTML=n>0?'<button class="mini" data-act="dl">⬇ 기록 내려받기 ('+n+')</button>':'';
}
function render(){
  const v=S.view;
  $('app').innerHTML=v==='home'?home():v==='setup'?setup():v==='pick'?pick():detail();
  hdr();post();
}
function post(){
  const gn=$('grp-name');if(gn)gn.addEventListener('input',e=>S.group.name=e.target.value);
  document.querySelectorAll('.grp-mem').forEach(el=>el.addEventListener('input',e=>{S.group.members[+e.target.dataset.idx]=e.target.value;}));
  const na=$('note-area');if(na)na.addEventListener('input',e=>{S.notes[S.picked]=e.target.value;hdr();});
}
const inIframe=(function(){try{return window.self!==window.top;}catch(e){return true;}})();
function openModal(title,body,footer){$('modal-root').innerHTML='<div class="modal-bg" data-act="close-bg"><div class="modal"><div class="modal-h"><b style="font-size:16px">'+title+'</b><button class="mini" data-act="close-modal" aria-label="닫기">✕ 닫기</button></div><div class="modal-b">'+body+'</div><div class="modal-f">'+footer+'</div></div></div>';}
function closeModal(){$('modal-root').innerHTML='';}
function toast(m){let t=$('toast');if(!t){t=document.createElement('div');t.id='toast';t.className='noprint';t.style.cssText='position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#402e34;color:#fff;padding:10px 16px;border-radius:10px;font-size:13.5px;z-index:200;opacity:0;transition:opacity .2s;box-shadow:0 6px 20px rgba(0,0,0,.2)';document.body.appendChild(t);}t.textContent=m;t.style.opacity='1';clearTimeout(window.__tt);window.__tt=setTimeout(()=>{t.style.opacity='0';},1700);}
function copyText(t){if(!t){toast('복사할 내용이 없습니다');return;}if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>toast('복사했습니다')).catch(()=>legacyCopy(t));}else legacyCopy(t);}
function legacyCopy(t){const ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;top:0;left:0;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');toast('복사했습니다');}catch(e){toast('복사가 막혔어요 — 상자 안 내용을 직접 선택해 복사하세요');}document.body.removeChild(ta);}
function doDownload(txt,name){try{const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1500);toast(inIframe?'저장을 시도했어요(미리보기에선 막힐 수 있어요)':'파일을 저장했습니다');}catch(e){toast('저장이 제한됨 — 복사를 이용하거나 파일을 내려받아 여세요');}}
function recordsText(){const filled=D.filter(s=>S.notes[s.id]&&S.notes[s.id].trim());let txt='학생 데이터 CASE 토론 기록\n모둠: '+(S.group.name||'(미입력)')+'\n구성원: '+(S.group.members.filter(Boolean).join(', ')||'(미입력)')+'\n'+'='.repeat(40)+'\n\n';if(!filled.length)txt+='아직 기록된 내용이 없습니다.\n';filled.forEach(s=>{txt+='[CASE '+s.id+'] '+s.t+'\n'+S.notes[s.id].trim()+'\n\n'+'-'.repeat(40)+'\n\n';});return txt;}
function openRecordsModal(){window.__rec=recordsText();const note=inIframe?'<div style="font-size:12.5px;color:var(--muted);margin-bottom:10px;line-height:1.6">미리보기(iframe)에서는 파일 저장이 제한될 수 있어요. 아래 내용을 <b>복사</b>해 쓰시거나, 이 HTML 파일을 내려받아 브라우저에서 열면 저장이 정상 작동합니다.</div>':'';const body=note+'<textarea id="rec-text" class="note" style="min-height:240px" readonly>'+esc(window.__rec)+'</textarea>';const footer='<button class="mini" data-act="copy-rec">복사</button><button class="cta" data-act="save-txt" style="border:none;background:var(--brand);color:#fff;border-radius:10px;padding:9px 16px;font-weight:700">텍스트 파일로 저장(.txt)</button>';openModal('토론 기록',body,footer);}
function sumText(s){const qs=QS(s.t);return '[CASE '+s.id+'] '+s.t+' — '+s.d+'\n모둠: '+(S.group.name||'(미입력)')+'\n\n[개요] '+s.ov+'\n\n[초기진단]\n· 국어 패턴: '+s.dgK.pat.join(' / ')+'\n  신호: '+s.dgK.sig.join(' / ')+'\n· 수학 패턴: '+s.dgM.pat.join(' / ')+'\n  신호: '+s.dgM.sig.join(' / ')+'\n\n[성취수준] 국어 나의수준 '+s.acK.my+'/학급평균 '+s.acK.avg+', 수학 나의수준 '+s.acM.my+'/학급평균 '+s.acM.avg+'\n\n[비인지] '+AX.map((a,i)=>a+' '+s.nc[i]).join(', ')+'\n\n[교사관찰]\n'+s.ob.map((o,i)=>(i+1)+'. '+o).join('\n')+'\n체크리스트: '+s.ck.join(', ')+'\n\n[상담요약] 인지: '+s.coCog+' 비인지: '+s.coNon+'\n\n[토론질문]\n'+qs.map((q,i)=>(i+1)+'. '+q).join('\n')+'\n\n[지원전략] 인지: '+s.sc+' 비인지: '+s.sn+'\n'+s.st.map((x,i)=>(i+1)+'. '+x).join('\n')+'\n\n[2주 성장 경로]\n인지: '+EXT[s.id].gr.cog.map((t,i)=>(i+1)+'주 '+t).join(' / ')+'\n비인지: '+EXT[s.id].gr.non.map((t,i)=>(i+1)+'주 '+t).join(' / ')+'\n\n[활동 예시]\n국어: '+EXT[s.id].av.kor.join(' / ')+'\n수학: '+EXT[s.id].av.math.join(' / ')+'\n\n[AI·디지털 도구] '+EXT[s.id].ai;}
function openSummaryModal(s){window.__sum=sumText(s);const note=inIframe?'<div style="font-size:12.5px;color:var(--muted);margin-bottom:10px;line-height:1.6">미리보기에서는 인쇄 창이 제한될 수 있어요. 이 HTML 파일을 내려받아 브라우저에서 열면 <b>인쇄·PDF 저장</b>이 정상 작동합니다. (아래 내용은 복사도 됩니다.)</div>':'';const body=note+'<div style="border:1px solid var(--line);border-radius:12px;padding:16px;color:#333">'+sheetHTML(s)+'</div>';const footer='<button class="mini" data-act="copy-sum">복사</button><button class="cta" data-act="do-print" style="border:none;background:var(--brand);color:#fff;border-radius:10px;padding:9px 16px;font-weight:700">🖨 인쇄 / PDF 저장</button>';openModal(s.t+' 요약 시트',body,footer);}
setInterval(()=>{if(TM.run&&TM.left>0){TM.left--;const d=$('tdisp');if(d)d.textContent=fmt(TM.left);const p=$('tprog');if(p)p.style.width=(TM.total?TM.left/TM.total*100:0)+'%';if(TM.left===0)TM.run=false;}},1000);

document.body.addEventListener('click',e=>{
  const b=e.target.closest('[data-act]');if(!b)return;const a=b.dataset.act;
  if(a==='start')S.view='setup';
  else if(a==='home')S.view='home';
  else if(a==='to-pick')S.view='pick';
  else if(a==='back-setup')S.view='setup';
  else if(a==='pick'){S.picked=+b.dataset.id;S.stage=0;S.maxStage=0;S.sub=0;S.view='detail';window.scrollTo(0,0);}
  else if(a==='exit'){S.view='pick';window.scrollTo(0,0);}
  else if(a==='step'){const i=+b.dataset.idx;if(i<=S.maxStage)S.stage=i;}
  else if(a==='sub')S.sub=+b.dataset.idx;
  else if(a==='sub-prev')S.sub=Math.max(0,S.sub-1);
  else if(a==='sub-next')S.sub=Math.min(5,S.sub+1);
  else if(a==='to-q'){S.stage=1;S.maxStage=Math.max(S.maxStage,1);}
  else if(a==='q-back')S.stage=0;
  else if(a==='to-s'){S.stage=2;S.maxStage=Math.max(S.maxStage,2);}
  else if(a==='s-back')S.stage=1;
  else if(a==='chk'){const ch=getChecks(S.picked);const i=+b.dataset.i;ch[i]=!ch[i];}
  else if(a==='t-preset'){const m=+b.dataset.m;TM.total=m*60;TM.left=m*60;TM.run=false;}
  else if(a==='t-toggle')TM.run=!TM.run;
  else if(a==='t-reset'){TM.left=TM.total;TM.run=false;}
  else if(a==='print'){openSummaryModal(cur());return;}
  else if(a==='dl'){openRecordsModal();return;}
  else if(a==='do-print'){try{window.print();}catch(e){toast('인쇄가 제한됨 — 파일을 내려받아 여세요');}return;}
  else if(a==='copy-rec'){copyText(window.__rec||'');return;}
  else if(a==='copy-sum'){copyText(window.__sum||'');return;}
  else if(a==='save-txt'){doDownload(window.__rec||'','CASE토론기록_'+(S.group.name||'모둠')+'.txt');return;}
  else if(a==='close-modal'){closeModal();return;}
  else if(a==='close-bg'){if(e.target===b)closeModal();return;}
  else return;
  render();
});
render();
</script>
</body>
</html>
